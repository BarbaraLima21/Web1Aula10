<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de Tarefas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        textarea {
            width: 100%;
            max-width: 500px;
            height: 150px;
            margin-bottom: 10px;
            display: block;
            padding: 8px;
        }
        button {
            padding: 8px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        #listaTarefas {
            margin-top: 20px;
            list-style-type: none;
            padding-left: 0;
        }
        #listaTarefas li {
            margin-bottom: 8px;
            font-size: 18px;
        }
    </style>
    <script>
        window.onload = inicio;

        function inicio() {
            let botao = document.getElementById('btnAtualizar');
            botao.addEventListener('click', atualizarAgenda);
            
            atualizarAgenda();
        }

        function atualizarAgenda() {
            let campoTexto = document.getElementById('txtTarefas');
            let containerLista = document.getElementById('listaTarefas');
            
            containerLista.innerHTML = "";
            
            let texto = campoTexto.value;

            let linhas = texto.split('\n');
            
            for (let i = 0; i < linhas.length; i++) {
                let linhaOriginal = linhas[i];
                
                if (linhaOriginal.trim() === "") {
                    continue;
                }
             
                let caractereInicial = linhaOriginal.charAt(0);
                let textoTarefa = linhaOriginal.substring(1).trim();
                let conteudoLinha = "";
                
                if (caractereInicial === '.') {
                    conteudoLinha = "🔲 " + textoTarefa; 
                } else if (caractereInicial === 'x' || caractereInicial === 'X') {
                    conteudoLinha = "✅ " + textoTarefa; 
                } else if (caractereInicial === '-') {
                    conteudoLinha = "<del>" + textoTarefa + "</del>";
                } else if (caractereInicial === '_') {
                    conteudoLinha = "<em>" + textoTarefa + "</em>"; 
                } else {
                    conteudoLinha = linhaOriginal;
                }
                
                containerLista.innerHTML += "<li>" + conteudoLinha + "</li>";
            }
        }
    </script>
</head>
<body>

    <h2>Minha Agenda Dinâmica</h2>
    <p>Digite suas tarefas no campo abaixo utilizando os marcadores no início de cada linha:</p>

    <textarea id="txtTarefas"></textarea>

    <button id="btnAtualizar">Atualizar Agenda</button>

    <h3>Tarefas Agendadas:</h3>
    <ul id="listaTarefas">
        </ul>

</body>
</html>
